# iOS Build Workflow for Multipass
#
# This workflow builds the iOS app using GitHub Actions macOS runners.
# iOS apps cannot be built in Docker due to Apple licensing restrictions.
#
# Outputs:
#   - Development: Simulator .app bundle (downloadable artifact)
#   - Release: Signed IPA (requires secrets configuration)
#
# Copyright (c) 2024 World Republic
# SPDX-License-Identifier: AGPL-3.0-or-later

name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - release
      upload_testflight:
        description: 'Upload to TestFlight (release only)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test -- --passWithNoTests

  build-ios:
    name: Build iOS App
    runs-on: macos-15
    timeout-minutes: 90
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Select Xcode version
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "Error: No Xcode installation found"
            exit 1
          fi
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: bundle exec pod install --repo-update

      # workflow_dispatch inputs.* is empty on push/PR — use github.event.inputs explicitly
      - name: Build iOS app (Development)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.build_type != 'release' }}
        working-directory: ios
        run: |
          set -o pipefail

          xcodebuild \
            -workspace Multipass.xcworkspace \
            -scheme Multipass \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            EXCLUDED_ARCHS=x86_64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild.log" | xcpretty --color || {
              echo "=== Build failed. Last 120 lines of log: ==="
              tail -120 "$RUNNER_TEMP/xcodebuild.log"
              exit 1
            }

          APP_PATH=$(find "$RUNNER_TEMP/DerivedData" -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "App bundle: $APP_PATH"
            mkdir -p "$RUNNER_TEMP/artifacts"
            cp -R "$APP_PATH" "$RUNNER_TEMP/artifacts/"
            cd "$RUNNER_TEMP/artifacts"
            zip -r Multipass-iOS-Simulator.zip "$(basename "$APP_PATH")"
          else
            echo "::error::No .app bundle found under DerivedData"
            find "$RUNNER_TEMP/DerivedData" -type d -maxdepth 6 | head -50
            exit 1
          fi

      - name: Setup code signing
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATE_BASE64" ]; then
            echo "::error::Release build requires code signing secrets."
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID.mobileprovision"

      - name: Build iOS app (Release)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release' }}
        working-directory: ios
        run: |
          set -o pipefail

          xcodebuild \
            -workspace Multipass.xcworkspace \
            -scheme Multipass \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Multipass.xcarchive" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            archive \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild.log" | xcpretty --color || {
              echo "=== Build failed. Last 120 lines of log: ==="
              tail -120 "$RUNNER_TEMP/xcodebuild.log"
              exit 1
            }

      - name: Export IPA
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error::APPLE_TEAM_ID secret is required for IPA export"
            exit 1
          fi

          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Multipass.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

          mkdir -p "$RUNNER_TEMP/artifacts"
          cp "$RUNNER_TEMP/export/"*.ipa "$RUNNER_TEMP/artifacts/"

      - name: Upload to TestFlight
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release' && (github.event.inputs.upload_testflight == true || github.event.inputs.upload_testflight == 'true') }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          if [ -z "$APP_STORE_CONNECT_API_KEY_ID" ]; then
            echo "::warning::App Store Connect API credentials not configured. Skipping upload."
            exit 0
          fi

          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/artifacts/"*.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Multipass-iOS-${{ github.event.inputs.build_type == 'release' && 'release' || 'development' }}
          path: |
            ${{ runner.temp }}/artifacts/*.zip
            ${{ runner.temp }}/artifacts/*.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/certificate.p12" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/profile.mobileprovision" 2>/dev/null || true
